version: '3.8'

services:
  mongodb:
    image: mongo:5.0
    container_name: eduflix-mongodb
    environment:
      MONGO_URI: mongodb://admin:password@mongodb:27017/eduflix
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - eduflix-network

  app:
    build: .
    container_name: eduflix-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://admin:password@mongodb:27017/eduflix
      - JWT_SECRET=your_super_secret_jwt_key_here_change_in_production
      - FRONTEND_URL=http://localhost:3000
    depends_on:
      - mongodb
    networks:
      - eduflix-network
    volumes:
      - ./logs:/app/logs

volumes:
  mongodb_data:

networks:
  eduflix-network:
    driver: bridge
